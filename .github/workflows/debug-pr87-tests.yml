name: Debug PR87 Tests

on:
  push:
    branches: [chatgpt/pipeline-selection-buffer-edge]
  workflow_dispatch:

jobs:
  debug-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet fetch PR merge ref
        run: |
          git init -q repo
          cd repo
          git remote add origin https://github.com/handsomeleeshu/Audio-Studio.git
          git fetch -q --depth=1 origin pull/87/merge:pr-merge
          git checkout -q pr-merge
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Run tests with visible output
        run: |
          cd repo
          chmod +x scripts/build_backend.sh scripts/run_tests.sh
          ./scripts/run_tests.sh
