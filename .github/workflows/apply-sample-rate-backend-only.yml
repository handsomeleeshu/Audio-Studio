name: Apply sample-rate backend-only fix

on:
  push:
    branches:
      - chatgpt/buffer-edge-sample-rate-backend-only

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[sample-rate-backend-only-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/buffer-edge-sample-rate-backend-only
          fetch-depth: 0
      - name: Apply patch
        run: node scripts/apply_sample_rate_backend_only_fix.mjs
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Require backend sample rate for buffer edge labels [sample-rate-backend-only-generated]"
          git push origin HEAD:chatgpt/buffer-edge-sample-rate-backend-only
