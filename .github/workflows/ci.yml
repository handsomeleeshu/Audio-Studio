name: Audio Studio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build mingw-w64 gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix gdb-mingw-w64 wine wine64 pkg-config git libasound2-dev libpulse-dev alsa-utils
      - name: Show ALSA topology compiler version
        run: alsatplg --version
      - name: Make scripts executable
        run: chmod +x scripts/build_all.sh scripts/run_tests.sh
      - name: Run tests
        run: ./scripts/run_tests.sh

  macos-driver-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
      - name: Install system dependencies
        run: brew install cmake ninja
      - name: Make scripts executable
        run: chmod +x scripts/build_all.sh
      - name: Build macOS as_config
        run: ./scripts/build_all.sh --profile as_config macos a2
      - name: Run macOS as_config portable generation
        run: |
          out/macos/a2/as_config/Debug/as_config \
            --input config/A2.json \
            --out-dir out/as-config-macos-ci \
            --project-name a2_macos_ci \
            --no-tplg
          test -s out/as-config-macos-ci/a2_macos_ci.conf
          test -s out/as-config-macos-ci/a2_macos_ci_private.bin
          test -s out/as-config-macos-ci/include/as_config_ids.h
          test ! -e out/as-config-macos-ci/a2_macos_ci.tplg
          test ! -e out/as-config-macos-ci/a2_macos_ci_decode.conf
      - name: Build macOS driver interface tests
        run: ./scripts/build_all.sh --profile driver_interface_tests_macos macos a2
      - name: Run macOS driver interface tests
        run: ctest --test-dir out/macos/a2/driver_interface_tests_macos/Debug --output-on-failure
