name: Audio Studio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          submodules: recursive
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build mingw-w64 gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix gdb-mingw-w64 wine wine64 pkg-config git libasound2-dev libpulse-dev libatopology-dev
      - name: Make scripts executable
        run: chmod +x scripts/build_all.sh scripts/run_tests.sh
      - name: Run tests
        run: ./scripts/run_tests.sh

  macos-driver-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
          submodules: recursive
      - name: Show tool versions
        run: |
          cmake --version
          clang++ --version
      - name: Install system dependencies
        run: |
          brew install cmake ninja pkg-config
          # Build and install alsa-lib for macOS
          cd /tmp
          curl -L https://github.com/alsa-project/alsa-lib/archive/refs/tags/v1.2.11.tar.gz -o alsa-lib.tar.gz
          tar xzf alsa-lib.tar.gz
          cd alsa-lib-1.2.11
          ./gitcompile --prefix=/usr/local
          ./configure --prefix=/usr/local --disable-python
          make -j$(sysctl -n hw.ncpu)
          sudo make install
      - name: Make scripts executable
        run: chmod +x scripts/build_all.sh
      - name: Build macOS driver interface tests
        run: ./scripts/build_all.sh --profile driver_interface_tests_macos macos a2
      - name: Run macOS driver interface tests
        run: ctest --test-dir out/macos/a2/driver_interface_tests_macos/Debug --output-on-failure
