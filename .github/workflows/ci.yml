name: Audio Studio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build mingw-w64 gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix gdb-mingw-w64 wine wine64 pkg-config git libasound2-dev libpulse-dev
      - name: Make scripts executable
        run: chmod +x scripts/build_all.sh scripts/run_tests.sh
      - name: Run tests
        run: ./scripts/run_tests.sh
