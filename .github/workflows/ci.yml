name: Audio Studio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet checkout current ref
        run: |
          git init -q .
          git remote add origin https://github.com/handsomeleeshu/Audio-Studio.git
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Make scripts executable
        run: chmod +x scripts/build_backend.sh scripts/run_tests.sh
      - name: Run tests
        run: ./scripts/run_tests.sh
