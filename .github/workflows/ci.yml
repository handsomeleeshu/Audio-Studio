name: Audio Studio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Make scripts executable
        run: chmod +x scripts/build_backend.sh scripts/run_tests.sh
      - name: Run tests
        run: |
          set +e
          ./scripts/run_tests.sh > /tmp/audio-studio-tests.log 2>&1
          status=$?
          cat /tmp/audio-studio-tests.log
          exit $status
