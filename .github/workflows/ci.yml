name: Audio Studio CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Show tool versions
        run: |
          node --version
          cmake --version
          g++ --version
      - name: Make scripts executable
        run: chmod +x scripts/build_backend.sh scripts/run_tests.sh
      - name: Run tests
        run: ./scripts/run_tests.sh
