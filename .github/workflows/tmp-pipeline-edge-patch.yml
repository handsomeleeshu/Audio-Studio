name: Temporary Pipeline Edge Patch

on:
  push:
    branches: [chatgpt/pipeline-selection-buffer-edge]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[patch-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/pipeline-selection-buffer-edge
          show-progress: false
      - name: Apply patch
        run: python3 scripts/apply_pipeline_edge_patch.py
      - name: Commit generated patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No generated changes"
          else
            git add frontend/index.html tests/frontend/pipeline-selection-buffer-edge.test.mjs scripts/run_tests.sh
            git commit -m "Implement pipeline select all and buffer edge runtime labels [patch-generated]"
            git push origin HEAD:chatgpt/pipeline-selection-buffer-edge
          fi
