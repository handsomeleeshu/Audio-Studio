name: Frontend Preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  preview-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: audio-studio-frontend-preview
          path: |
            frontend
            config/A2.json
