name: Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rm -rf p && mkdir -p p && cp -R GUI/frontend/. p/ && mkdir -p p/config && cp config/*.json p/config/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: p
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
