name: Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir p && cp -r frontend/* p/ && mkdir p/config && cp config/A2.json p/config/A2.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: p
  deploy:
    needs: build
    runs-on: